<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>审核稿</title>
  <script src="https://unpkg.com/wavesurfer.js@7"></script>
  <style>
    /* 剪口播审核页样式 */
    
    /* 浅色模式主题 - 清新阅读体验 */
    :root {
      --bg-primary: #fafafa;
      --bg-tertiary: #f5f5f5;
      --bg-overlay: rgba(255, 255, 255, 0.95);
      --text-primary: #1a1a2e;
      --text-secondary: #4a4a68;
      --border: #e8e8ec;
      --auto-selected: #C084FC4D;
      /* 手动选中（非AI预选） */
      --stone-50: #FAFAF9;
      --stone-100: #f5f5f4;
      --stone-200: #E7E5E4;
      --stone-300: #d6d3d1;
      --stone-400: #A8A29E;
      --stone-500: #78716C;
      --stone-700: #44403c;
      --stone-900: #1c1917;
      --lime-200: #D9F99D;
      --lime-300: #CAE595;
      --lime-700: #4D7C0F;
      --preview-stroke-color: rgba(77, 124, 15, 0.5);
      --preview-stroke-width: 2px;
      --preview-dash-length: 2px;
      --preview-dash-gap: 2px;
      --preview-horizontal-stroke:
        repeating-linear-gradient(
          90deg,
          var(--preview-stroke-color) 0 var(--preview-dash-length),
          transparent var(--preview-dash-length) calc(var(--preview-dash-length) + var(--preview-dash-gap))
        );
      --preview-vertical-stroke:
        repeating-linear-gradient(
          180deg,
          var(--preview-stroke-color) 0 var(--preview-dash-length),
          transparent var(--preview-dash-length) calc(var(--preview-dash-length) + var(--preview-dash-gap))
        );
      --red-800: #991b1b;
      --white-300: #FFFFFF;
      --stone-200-hover: rgba(231, 229, 228, 0.7);
      --sidebar-backdrop: rgba(28, 25, 23, 0.14);
      --shadow-player: 0 6px 40px 0 rgba(68, 64, 60, 0.04);
      --shadow-sidebar-mobile: 8px 0 40px rgba(28, 25, 23, 0.12);
      --space-050: 2px;
      --space-100: 4px;
      --space-150: 6px;
      --space-200: 8px;
      --space-250: 10px;
      --space-300: 12px;
      --space-350: 16px;
      --space-400: 20px;
      --space-500: 24px;
      --space-600: 32px;
      --space-700: 40px;
      --r-100: 8px;
      --r-200: 20px;
      --r-pill: 26.5px;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }
    
    body.sidebar-open-mobile {
      overflow: hidden;
    }
    
    /* ========== 顶部控制栏 ========== */
    .controls {
      position: fixed;
      top: 0;
      left: 332px;
      width: calc(100% - 332px);
      background: var(--bg-primary);
      padding: 0 0 var(--space-300);
      z-index: 100;
      transition: left 0.28s ease, width 0.28s ease;
    }
    
    .controls-topbar {
      display: none;
      max-width: 944px;
      margin: 0 auto var(--space-200);
    }
    
    .mobile-sidebar-trigger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: var(--r-100);
      background: var(--stone-100);
      color: var(--stone-700);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }
    
    .mobile-sidebar-trigger:hover {
      background: var(--stone-200);
      color: var(--stone-900);
    }
    
    .mobile-sidebar-trigger:focus,
    .mobile-sidebar-trigger:focus-visible {
      outline: none;
      box-shadow: none;
    }
    
    .buttons {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-400) var(--space-700);
      background: var(--bg-primary);
    }
    
    .buttons-left,
    .buttons-right {
      display: flex;
      align-items: center;
      gap: var(--space-200);
    }
    
    .buttons-left {
      gap: 0;
    }
    
    .buttons-left .btn-tertiary,
    .buttons-right .btn-primary,
    .buttons-right .btn-secondary {
      font-size: 14px;
    }
    
    /* ========== 按钮样式 ========== */
    .btn-tertiary {
      display: flex;
      align-items: center;
      gap: var(--space-200);
      height: 44px;
      padding: var(--space-300) var(--space-400);
      background: transparent;
      border: none;
      border-radius: var(--r-100);
      color: var(--stone-700);
      font-size: 16px;
      cursor: pointer;
      transition: background 0.15s ease;
      white-space: nowrap;
    }
    .btn-tertiary:hover {
      background: var(--bg-tertiary);
    }
    .btn-tertiary:disabled {
      background: transparent;
      color: var(--stone-400);
      cursor: not-allowed;
    }
    .btn-tertiary:disabled:hover {
      background: transparent;
    }
    .btn-tertiary.danger {
      color: var(--red-800);
    }
    
    .divider {
      width: 0;
      height: 20px;
      border-left: 1px solid var(--border);
      flex-shrink: 0;
    }
    
    .btn-primary {
      display: flex;
      align-items: center;
      gap: var(--space-200);
      height: 44px;
      padding: var(--space-300) var(--space-400);
      background: var(--stone-900);
      border: none;
      border-radius: var(--r-100);
      color: var(--stone-100);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s ease;
      white-space: nowrap;
    }
    .btn-primary:hover {
      opacity: 0.9;
    }
    
    .btn-secondary {
      display: flex;
      align-items: center;
      gap: var(--space-200);
      height: 44px;
      padding: var(--space-300) var(--space-400);
      background: transparent;
      border: 1px solid var(--stone-300);
      border-radius: var(--r-100);
      color: var(--stone-700);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s ease;
      white-space: nowrap;
    }
    .btn-secondary:hover {
      border-color: var(--stone-700);
    }
    
    .btn-tooltip {
      position: relative;
    }
    
    .btn-tooltip::after {
      content: attr(data-tooltip);
      position: absolute;
      left: 50%;
      top: calc(100% + var(--space-200));
      transform: translateX(-50%) translateY(calc(-1 * var(--space-100)));
      padding: var(--space-100) var(--space-200);
      border-radius: var(--r-100);
      background: var(--stone-100);
      border: 1px solid var(--stone-300);
      color: var(--stone-700);
      font-size: 12px;
      font-weight: 400;
      line-height: 1.4;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    
    .btn-tooltip:hover::after {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    
    .btn-icon {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    /* ========== 播放器 ========== */
    .player {
      max-width: 944px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: var(--space-350);
      padding: var(--space-300) var(--space-400) var(--space-350);
      background: var(--white-300);
      border-radius: var(--r-200);
      box-shadow: var(--shadow-player);
      width: 100%;
    }
    
    @media (max-width: 960px) {
      .player {
        max-width: 100%;
      }
    }
    
    .player-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .player-title {
      font-size: 16px;
      color: var(--stone-700);
      font-weight: 400;
    }
    
    .player-controls {
      display: flex;
      align-items: center;
      gap: var(--space-400);
    }
    
    .speed-select {
      position: relative;
      display: flex;
      align-items: center;
    }
    
    .speed-select select {
      appearance: none;
      padding: var(--space-150) 28px var(--space-150) var(--space-300);
      background: var(--white-300);
      color: var(--stone-900);
      border: 1px solid var(--stone-300);
      border-radius: var(--r-100);
      font-size: 16px;
      cursor: pointer;
      height: 32px;
    }
    
    .speed-select select:hover {
      border-color: var(--stone-700);
    }
    
    .speed-chevron {
      position: absolute;
      top: 50%;
      right: var(--space-200);
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--stone-500);
    }
    
    .play-controls {
      display: flex;
      align-items: center;
      gap: var(--space-400);
    }
    
    .play-btn-main {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      padding: 0;
      background: var(--stone-100);
      border: none;
      border-radius: var(--r-pill);
      cursor: pointer;
      color: var(--stone-900);
      transition: opacity 0.15s;
    }
    
    .play-btn-main:hover {
      opacity: 0.85;
    }
    
    .player-progress {
      display: flex;
      flex-direction: column;
      gap: var(--space-200);
    }
    
    #waveform {
      width: 100%;
      height: 40px;
      border-radius: var(--r-100);
      overflow: hidden;
    }
    
    .time-display {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 12px;
      color: var(--stone-400);
      font-weight: 400;
    }
    
    #currentTime {
      font-variant-numeric: tabular-nums;
    }
    
    #totalTime {
      font-variant-numeric: tabular-nums;
      color: var(--stone-400);
      margin-left: -6px;
    }
    
    /* ========== 文字区域 ========== */
    .word {
      line-height: 44px;
      padding: 0 var(--space-100);
      cursor: pointer;
      display: inline-block;
      position: relative;
      transition: all 0.15s ease;
      vertical-align: top;
    }
    
    .word.whitespace-token {
      width: 0;
      padding: 0;
      overflow: hidden;
    }
    .word:not(.selected):hover {
      background-color: var(--bg-tertiary);
      border-radius: var(--r-100);
    }
    
    /* 静音 */
    .word.gap {
      color: var(--stone-500);
      font-size: 13px;
      font-weight: 300;
      padding: 0 var(--space-200);
    }
    .word.gap:not(.selected):hover {
      background-color: var(--bg-tertiary);
      border-radius: var(--r-100);
    }
    
    .gap-group {
      position: relative;
      display: inline;
    }
    
    .gap-group-collapse {
      position: fixed;
      left: 0;
      top: 0;
      transform: translateY(-50%);
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--stone-500);
      font-size: 12px;
      line-height: 1;
      padding: 7px 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease, transform 120ms ease;
      cursor: pointer;
      z-index: 20;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .gap-group.expanded .gap-group-collapse,
    .gap-group.expanded:focus-within .gap-group-collapse {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-50%);
    }
    
    .gap-group-collapse:hover,
    .gap-group-collapse:focus-visible {
      background: var(--stone-200);
      color: var(--stone-700);
    }
    
    .gap-group-collapse-icon {
      display: block;
      flex: 0 0 auto;
    }
    
    .gap-collapsed-toggle {
      cursor: pointer;
      color: var(--stone-400);
      border: 0;
      border-radius: 0 !important;
      background: var(--stone-200);
      text-decoration: line-through;
    }
    
    .gap-collapsed-toggle:hover {
      color: var(--stone-500);
      background: var(--stone-300);
    }
    
    .gap-collapsed-toggle.auto-selected::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: var(--auto-selected);
      pointer-events: none;
    }
    
    .gap-collapsed-toggle.selected-start,
    .gap-collapsed-toggle.selected-end,
    .gap-collapsed-toggle.selected-start.selected-end {
      border-radius: 0 !important;
    }
    
    /* 选中删除（手动选中） */
    .word:not(.auto-selected).selected {
      background-color: var(--stone-200);
      color: var(--stone-400);
      text-decoration: line-through;
    }
    .word:not(.auto-selected).selected:hover {
      background-color: var(--stone-300);
      color: var(--stone-500);
    }
    
    .word.auto-selected.selected:hover {
      background-color: var(--stone-300);
      color: var(--stone-500);
    }
    
    .gap-group.button-hover .word.selected {
      background-color: var(--stone-300);
      color: var(--stone-500);
    }
    
    .word.selected-start {
      border-radius: var(--r-100) 0 0 var(--r-100);
    }
    .word.selected-end {
      border-radius: 0 var(--r-100) var(--r-100) 0;
    }
    
    /* 单个选中时四角圆角（优先级高于单独的 start/end） */
    .word.selected-start.selected-end {
      border-radius: var(--r-100);
    }
    
    .word.preview-range {
      z-index: 1;
      background-image:
        var(--preview-horizontal-stroke),
        var(--preview-horizontal-stroke);
      background-position: top left, bottom left;
      background-repeat: no-repeat;
      background-size: 100% var(--preview-stroke-width), 100% var(--preview-stroke-width);
    }
    
    .word.preview-range.preview-start {
      background-image:
        var(--preview-horizontal-stroke),
        var(--preview-horizontal-stroke),
        var(--preview-vertical-stroke);
      background-position: top left, bottom left, left top;
      background-repeat: no-repeat, no-repeat, no-repeat;
      background-size:
        100% var(--preview-stroke-width),
        100% var(--preview-stroke-width),
        var(--preview-stroke-width) 100%;
      border-radius: var(--r-100) 0 0 var(--r-100);
    }
    
    .word.preview-range.preview-end {
      background-image:
        var(--preview-horizontal-stroke),
        var(--preview-horizontal-stroke),
        var(--preview-vertical-stroke);
      background-position: top left, bottom left, right top;
      background-repeat: no-repeat, no-repeat, no-repeat;
      background-size:
        100% var(--preview-stroke-width),
        100% var(--preview-stroke-width),
        var(--preview-stroke-width) 100%;
      border-radius: 0 var(--r-100) var(--r-100) 0;
    }
    
    .word.preview-range.preview-start.preview-end {
      background-image:
        var(--preview-horizontal-stroke),
        var(--preview-horizontal-stroke),
        var(--preview-vertical-stroke),
        var(--preview-vertical-stroke);
      background-position: top left, bottom left, left top, right top;
      background-repeat: no-repeat, no-repeat, no-repeat, no-repeat;
      background-size:
        100% var(--preview-stroke-width),
        100% var(--preview-stroke-width),
        var(--preview-stroke-width) 100%,
        var(--preview-stroke-width) 100%;
      border-radius: var(--r-100);
    }
    
    .gap-collapsed-toggle.preview-range.preview-start {
      border-radius: var(--r-100) 0 0 var(--r-100) !important;
    }
    
    .gap-collapsed-toggle.preview-range.preview-end {
      border-radius: 0 var(--r-100) var(--r-100) 0 !important;
    }
    
    .gap-collapsed-toggle.preview-range.preview-start.preview-end {
      border-radius: var(--r-100) !important;
    }
    
    /* 当前播放 */
    .word.current {
      background-color: var(--lime-200);
      color: var(--stone-900);
      border-radius: var(--r-100);
      box-shadow: 0 0 0 1px var(--stone-50);
    }
    
    /* 当前播放 + 选中时，current 优先 */
    .word.current.selected {
      background-color: var(--lime-300) !important;
      color: var(--stone-900) !important;
    }
    
    /* AI预选（下划线），与选中状态组合时保持下划线 + 选中样式 */
    .word.auto-selected {
      z-index: 0;
    }
    .word.auto-selected::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: var(--auto-selected);
      border-radius: 0;
      pointer-events: none;
    }
    .word.auto-selected.selected {
      background-color: var(--stone-200);
      color: var(--stone-400);
      text-decoration: line-through;
    }
    
    /* ========== 统计栏 ========== */
    .stats {
      display: none; /* 隐藏右下角统计面板 */
    }
    
    /* ========== Loading ========== */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-overlay);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .loading-overlay.show {
      display: flex;
    }
    .loading-text {
      font-size: 20px;
      color: var(--text-secondary);
    }
    
    /* ========== 左侧侧边栏 ========== */
    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      background: var(--sidebar-backdrop);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.24s ease;
      z-index: 180;
    }
    
    .sidebar-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }
    
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 332px;
      background: var(--stone-100);
      padding: var(--space-400) var(--space-600);
      display: flex;
      flex-direction: column;
      gap: var(--space-600);
      overflow: hidden;
      z-index: 200;
      transition: width 0.28s ease, transform 0.28s ease, box-shadow 0.28s ease;
      box-shadow: 0 0 0 0 transparent;
    }
    
    .sidebar.collapsed {
      width: 108px;
      transform: translateX(0);
    }
    
    .sidebar.mobile-hidden {
      transform: translateX(-100%);
    }
    
    .sidebar.mobile-open {
      transform: translateX(0);
      box-shadow: var(--shadow-sidebar-mobile);
    }
    
    .sidebar-content {
      display: flex;
      flex-direction: column;
      gap: var(--space-600);
      width: 100%;
      min-width: 0;
      padding-left: var(--space-300);
      transition: transform 0.28s ease, opacity 0.2s ease;
    }
    
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }
    
    .sidebar-toggle {
      width: 44px;
      height: 44px;
      background: transparent;
      border: none;
      border-radius: var(--r-100);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--stone-700);
      transition: background 0.15s ease, color 0.15s ease, transform 0.24s ease;
    }
    
    .sidebar-toggle:hover {
      background: var(--stone-200-hover);
      color: var(--stone-900);
    }
    
    .sidebar-toggle:focus,
    .sidebar-toggle:focus-visible {
      outline: none;
      box-shadow: none;
    }
    
    .sidebar.collapsed .sidebar-content {
      padding-left: 0;
      transform: translateX(-224px);
    }
    
    .sidebar.collapsed .sidebar-group,
    .sidebar-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-400);
    }
    
    .sidebar-group-title {
      font-size: 12px;
      line-height: 20px;
      font-weight: 700;
      color: var(--stone-400);
    }
    
    .sidebar-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-400);
      width: 100%;
    }
    
    .sidebar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-350);
    }
    
    .sidebar-label {
      flex: 1;
      min-width: 0;
      color: var(--stone-900);
      font-size: 14px;
      line-height: 20px;
    }
    
    .legend-swatch {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      border-radius: var(--r-100);
      background: var(--stone-200);
    }
    
    .legend-swatch-auto {
      position: relative;
    }
    
    .legend-swatch-auto::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 6px;
      border-radius: 0 0 var(--r-100) var(--r-100);
      background: var(--auto-selected);
    }
    
    .legend-swatch-selected {
      background: var(--stone-200);
    }
    
    .legend-swatch-current {
      background: var(--lime-200);
      border: 1px solid var(--stone-50);
    }
    
    .shortcut-combo {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: var(--space-100);
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    
    .shortcut-pill {
      display: inline-flex;
      align-items: center;
      gap: var(--space-050);
      height: 24px;
      padding: 0 var(--space-200);
      background: var(--stone-200);
      border-radius: var(--r-100);
      color: var(--stone-700);
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 14px;
      line-height: 20px;
      white-space: nowrap;
    }
    
    .shortcut-pill-text {
      padding: 0 var(--space-250);
    }
    
    .shortcut-pill-icon-only {
      width: 24px;
      justify-content: center;
      padding: 0;
    }
    
    .shortcut-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--stone-700);
    }
    
    .shortcut-plus,
    .shortcut-or {
      color: var(--stone-500);
      font-size: 14px;
      line-height: 20px;
    }
    
    /* ========== 主体内容 ========== */
    .main-wrapper {
      margin-left: 332px;
      width: calc(100% - 332px);
      min-width: 0;
      background: var(--stone-50);
      padding-top: var(--controls-offset, 0px);
      transition: margin-left 0.28s ease, width 0.28s ease;
    }
    
    .main-wrapper.sidebar-collapsed {
      margin-left: 108px;
      width: calc(100% - 108px);
    }
    
    .main-wrapper.sidebar-collapsed .controls {
      left: 108px;
      width: calc(100% - 108px);
    }
    
    .content {
      max-width: 960px;
      margin: 0 auto;
      padding: var(--space-350) var(--space-400) var(--space-700);
      line-height: 56px;
      font-size: 0; /* 消除inline-block单词间的空格 */
      width: 100%;
    }
    
    @media (max-width: 960px) {
      .content {
        max-width: 100%;
      }
    }
    .content .word {
      font-size: 18px;
      user-select: none;
      -webkit-user-select: none;
    }
    
    .content .word.gap {
      font-size: 14px;
    }
    
    @media (max-width: 1080px) {
      .buttons {
        flex-direction: column;
        align-items: stretch;
        gap: var(--space-350);
        padding: var(--space-350) var(--space-400);
      }
    
      .buttons-left,
      .buttons-right {
        flex-wrap: wrap;
      }
    
      .player {
        padding-left: var(--space-350);
        padding-right: var(--space-350);
      }
    }
    
    @media (max-width: 860px) {
      .sidebar {
        width: min(320px, calc(100vw - 28px));
        padding: var(--space-400) var(--space-400) var(--space-500);
      }
    
      .sidebar.mobile-hidden {
        transform: translateX(-100%);
      }
    
      .sidebar.collapsed {
        transform: translateX(-100%);
      }
    
      .main-wrapper,
      .main-wrapper.sidebar-collapsed {
        margin-left: 0;
        width: 100%;
      }
    
      .controls {
        left: 0;
        width: 100%;
      }
    
      .controls {
        padding: var(--space-300) var(--space-300) var(--space-350);
      }
    
      .controls-topbar {
        display: flex;
        align-items: center;
      }
    
      .buttons {
        padding: var(--space-300) var(--space-200);
      }
    
      .buttons-left,
      .buttons-right {
        gap: var(--space-150);
      }
    
      .btn-tertiary,
      .btn-primary,
      .btn-secondary {
        font-size: 14px;
        height: 40px;
        padding: var(--space-250) 14px;
      }
    
      .content {
        padding: var(--space-200) var(--space-300) var(--space-500);
      }
    
      .sidebar-content {
        gap: 28px;
        padding-left: 0;
      }
    }
    
  </style>
</head>

            headers: { 'Content-Type': 'application/json' },
            body: payload,
            keepalive: eventName === 'close'
          });
          return true;
        } catch (err) {
          console.warn(`session ${eventName} failed`, err);
          return false;
        }

      function startSessionHeartbeat() {
        sessionPingTimer = window.setInterval(() => {
          if (!sessionClosed) {
            sendSessionEvent('ping');
          }
        }, sessionPingIntervalMs);
      }
    
      function closeSession(useBeacon = false) {
        if (sessionClosed) return;
        sessionClosed = true;
        if (sessionPingTimer) {
          clearInterval(sessionPingTimer);
          sessionPingTimer = null;
        }
        sendSessionEvent('close', useBeacon);
      }
    
      sendSessionEvent('open').then((ok) => {
        if (ok && !sessionClosed) {
          startSessionHeartbeat();

      window.addEventListener('pagehide', () => closeSession(true));
      window.addEventListener('beforeunload', () => closeSession(true));
    
      // 应用过零点偏移
      function applyZeroCrossing(time) {
        const key = time.toFixed(2);
        if (zeroCrossingOffsets[key] !== undefined) {
          return time + zeroCrossingOffsets[key];
        }
        return time;
      }
    
      // 初始化 wavesurfer
      const wavesurfer = WaveSurfer.create({

      const currentTimeEl = document.getElementById('currentTime');
      const totalTimeEl = document.getElementById('totalTime');
      const content = document.getElementById('content');

      const controls = document.querySelector('.controls');
      const sidebarToggle = document.getElementById('sidebarToggle');
      const sidebarBackdrop = document.getElementById('sidebarBackdrop');
      const mobileQuery = window.matchMedia('(max-width: 860px)');
      let elements = [];
      let isSelecting = false;
      let selectStart = -1;
      let selectMode = 'add'; // 'add' or 'remove'
      let pendingShiftDragStart = -1;
      let pendingShiftDragPoint = null;
      let pendingShiftDragCurrent = -1;
      let pendingClickTimer = null; // 延迟执行的单击回调，用于区分单击/双击
      let suppressNextClick = false;
      let sidebarCollapsedDesktop = false;
      let sidebarOpenMobile = false;
      const expandedGapGroups = new Set();
      let shiftRangeAnchor = null;

      let selectionHistory = [Array.from(selected).sort((a, b) => a - b)];
      let historyIndex = 0;
    
      function isSameSnapshot(a, b) {
        if (a.length !== b.length) return false;
        for (let i = 0; i < a.length; i++) {
          if (a[i] !== b[i]) return false;
        }
        return true;
      }
    
      function getSelectionSnapshot() {
        return Array.from(selected).sort((a, b) => a - b);
      }
    
      function updateHistoryButtons() {
        if (undoButton) {
          undoButton.disabled = historyIndex <= 0;
        }
        if (redoButton) {
          redoButton.disabled = historyIndex >= selectionHistory.length - 1;
        }
      }
    
      function pushSelectionHistory(snapshot) {
        if (isSameSnapshot(selectionHistory[historyIndex], snapshot)) {
          updateHistoryButtons();
          return false;
        }
    
        selectionHistory = selectionHistory.slice(0, historyIndex + 1);
        selectionHistory.push(snapshot);
        historyIndex = selectionHistory.length - 1;
        updateHistoryButtons();
        return true;
      }
    
      function applySelectionSnapshot(snapshot, shouldRender = true) {
        selected = new Set(snapshot);
        expandedGapGroups.clear();
        updateHistoryButtons();
        if (shouldRender) {
          render();
        }
      }
    
      function commitSelectionChange(mutator) {
        const beforeSnapshot = getSelectionSnapshot();
        mutator();
        const afterSnapshot = getSelectionSnapshot();
    
        if (isSameSnapshot(beforeSnapshot, afterSnapshot)) {
          return false;
        }
    
        pushSelectionHistory(afterSnapshot);
        expandedGapGroups.clear();
        render();
        return true;
      }
    
      // 页面加载时尝试加载保存的方案
      (async function loadSavedSelection() {

      // 格式化时间 (用于播放器显示)
      function formatTime(sec) {
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      }
    
      // 格式化时长 (用于剪辑结果显示，带秒数)
      function formatDuration(sec) {
        const totalSec = parseFloat(sec);
        const m = Math.floor(totalSec / 60);
        const s = (totalSec % 60).toFixed(1);
        if (m > 0) {
          return `${m}分${s}秒 (${totalSec}s)`;
        }
        return `${s}秒`;
      }
    
      function getSelectionStats() {
        const totalDuration = wavesurfer.getDuration();
        let deleteDuration = 0;
    
        words.forEach((w, i) => {
          if (selected.has(i)) {
            deleteDuration += w.end - w.start;
          }
        });
    
        const keptDuration = Math.max(0, totalDuration - deleteDuration);
        const deletedPercent = totalDuration > 0
          ? (deleteDuration / totalDuration * 100).toFixed(1)
          : '0.0';
    
        return {
          totalDuration,
          deleteDuration,
          keptDuration,
          deletedPercent
        };
      }
    
      // 更新播放器标题（成品时长、删除百分比和 AI 预选有效度）
      function updatePlayerTitle(currentTime, totalDuration) {
        const playerTitle = document.getElementById('playerTitle');
        if (!playerTitle || !totalDuration) return;
    
        // 计算已删除的时长（基于选中片段）
        let deletedDuration = 0;
        const sortedSelected = Array.from(selected).sort((a, b) => a - b);
        for (const i of sortedSelected) {
          const w = words[i];
          if (w && w.end > w.start) {
            deletedDuration += (w.end - w.start);
          }
        }
    
        const keptDuration = totalDuration - deletedDuration;
        const savedPercent = totalDuration > 0 ? Math.round((keptDuration / totalDuration) * 100) : 0;
        const deletedPercent = 100 - savedPercent;
    
        // 格式化成品时长
        const keptM = Math.floor(keptDuration / 60);
        const keptS = (keptDuration % 60).toFixed(1);
        const keptTimeStr = keptM > 0 ? `${keptM}分${keptS}秒` : `${keptS}秒`;
    
        const keptAutoSelectedCount = Array.from(selected).filter(i => autoSelected.has(i)).length;
        const manuallyAddedCount = Array.from(selected).filter(i => !autoSelected.has(i)).length;
        const effectivenessDenominator = autoSelected.size + manuallyAddedCount;
        const effectiveness = effectivenessDenominator > 0
          ? Math.round((keptAutoSelectedCount / effectivenessDenominator) * 100)
          : 0;
    
        playerTitle.textContent = `成品时长 ${keptTimeStr}，已删除${deletedPercent}%，AI预选有效度${effectiveness}%`;
      }
    
      // 更新播放/暂停图标
      function updatePlayPauseIcon(isPlaying) {
        const playIcon = document.getElementById('playIcon');
        if (!playIcon) return;
    
        if (isPlaying) {
          // 暂停图标（两条竖线）
          playIcon.innerHTML = `
            <rect x="4" y="2" width="3" height="12" rx="0.5" fill="currentColor"/>
            <rect x="9" y="2" width="3" height="12" rx="0.5" fill="currentColor"/>
          `;
        } else {
          // 播放图标（三角形）
          playIcon.innerHTML = `<path d="M4 2L14 8L4 14V2Z" fill="currentColor"/>`;
        }
      }
    
      function syncSidebarUI() {
        if (!sidebar || !main) return;
    
        const isMobile = mobileQuery.matches;
        sidebar.classList.toggle('collapsed', !isMobile && sidebarCollapsedDesktop);
        sidebar.classList.toggle('mobile-open', isMobile && sidebarOpenMobile);
        sidebar.classList.toggle('mobile-hidden', isMobile && !sidebarOpenMobile);
        main.classList.toggle('sidebar-collapsed', !isMobile && sidebarCollapsedDesktop);
    
        if (sidebarBackdrop) {
          sidebarBackdrop.classList.toggle('visible', isMobile && sidebarOpenMobile);
        }
    
        document.body.classList.toggle('sidebar-open-mobile', isMobile && sidebarOpenMobile);
    
        if (sidebarToggle) {
          const label = isMobile
            ? (sidebarOpenMobile ? '关闭侧边栏' : '打开侧边栏')
            : (sidebarCollapsedDesktop ? '展开侧边栏' : '收起侧边栏');
          sidebarToggle.setAttribute('aria-label', label);
        }
    
        requestAnimationFrame(updateControlsOffset);

      function updateControlsOffset() {
        if (!controls) return;
        const height = Math.ceil(controls.getBoundingClientRect().height);
        document.documentElement.style.setProperty('--controls-offset', `${height}px`);
      }
    
      function positionExpandedGapButtons() {
        if (!content) return;
    
        const contentRect = content.getBoundingClientRect();
        const viewportWidth = window.innerWidth;
        const expandedGroups = content.querySelectorAll('.gap-group.expanded');
    
        expandedGroups.forEach((group) => {
          const button = group.querySelector('.gap-group-collapse');
          if (!button) return;
    
          const groupRect = group.getBoundingClientRect();
          const firstWord = group.querySelector('.word');
          const anchorRect = firstWord ? firstWord.getBoundingClientRect() : groupRect;
          const buttonWidth = Math.ceil(button.getBoundingClientRect().width) || 44;
          const leftCandidate = contentRect.left - buttonWidth - 12;
          const rightCandidate = contentRect.right + 12;
          const canPlaceRight = rightCandidate + buttonWidth <= viewportWidth - 8;
          const x = leftCandidate >= 8 || !canPlaceRight
            ? Math.max(8, leftCandidate)
            : rightCandidate;
    
          button.style.left = `${Math.round(x)}px`;
          button.style.top = `${Math.round(anchorRect.top + anchorRect.height / 2)}px`;
        });
      }
    
      // 侧边栏展开/收起

        }
        syncSidebarUI();

      function getGapGroupKey(start, end) {
        return `${start}-${end}`;
      }
    
      function findSelectedGapGroup(index) {
        const word = words[index];
        if (!word || !word.isGap || !selected.has(index)) return null;
    
        let start = index;
        let end = index;
    
        while (start > 0 && words[start - 1].isGap && selected.has(start - 1)) {
          start--;
        }
        while (end < words.length - 1 && words[end + 1].isGap && selected.has(end + 1)) {
          end++;
        }
    
        return { start, end, key: getGapGroupKey(start, end), length: end - start + 1 };
      }
    
      function getCollapsibleGapGroupAt(index) {
        const group = findSelectedGapGroup(index);
        if (!group || group.start !== index || group.length <= 3) return null;
        return group;
      }
    
      function createWordElement(i) {
        const word = words[i];
        const span = document.createElement('span');
        span.className = 'word';
        span.dataset.index = i;
        const isWhitespaceToken = !word.isGap && /^\s+$/.test(word.text || '');
    
        if (word.isGap) {
          span.classList.add('gap');
          span.textContent = `[${(word.end - word.start).toFixed(1)}s]`;
        } else {
          span.textContent = isWhitespaceToken ? '' : word.text;
        }
    
        if (isWhitespaceToken) {
          span.classList.add('whitespace-token');
        }
    
        if (autoSelected.has(i)) {
          span.classList.add('auto-selected');
        }
        if (selected.has(i)) {
          span.classList.add('selected');
        }
    
        // 单击跳转播放；Shift+单击用于区间选择
        span.onclick = (e) => {
          if (suppressNextClick) {
            suppressNextClick = false;
            return;
          }
    
          if (isSelecting) return;
          if (e.shiftKey) {
            if (shiftRangeAnchor === null) {
              shiftRangeAnchor = i;
              updatePreviewRange(i, i);
            } else {
              applyRangeSelection(shiftRangeAnchor, i);
              resetShiftPreview();
            }
            return;
          }
    
          resetShiftPreview();
          if (pendingClickTimer) return;
          pendingClickTimer = setTimeout(() => {
            pendingClickTimer = null;
            wavesurfer.setTime(word.start);
          }, 250);
        };
    
        // 双击选中/取消（立即执行，并取消待处理的单击）
        span.ondblclick = (e) => {
          e.preventDefault();
          if (pendingClickTimer) {
            clearTimeout(pendingClickTimer);
            pendingClickTimer = null;
          }
    
          resetShiftPreview();
          toggle(i);
        };
    
        span.onmouseenter = () => {
          if (isSelecting || shiftRangeAnchor === null || i === shiftRangeAnchor) {
            return;
          }
          updatePreviewRange(shiftRangeAnchor, i);
        };
    
        // Shift+拖动选择/取消
        span.onmousedown = (e) => {
          if (e.shiftKey) {
            pendingShiftDragStart = i;
            pendingShiftDragPoint = { x: e.clientX, y: e.clientY };

          }

        elements[i] = span;
        return span;

      function createCollapsedGapPlaceholder(group) {
        const hiddenDuration = words
          .slice(group.start + 1, group.end)
          .reduce((sum, word) => sum + (word.end - word.start), 0);
        const hiddenIndexes = Array.from(
          { length: Math.max(0, group.end - group.start - 1) },
          (_, offset) => group.start + 1 + offset
        );
        const isAutoSelectedGroup = hiddenIndexes.length > 0 && hiddenIndexes.every(index => autoSelected.has(index));
    
        const placeholder = document.createElement('span');
        placeholder.className = 'word gap gap-collapsed-toggle selected selected-start selected-end';
        placeholder.dataset.groupStart = group.start + 1;
        placeholder.dataset.groupEnd = group.end - 1;
        if (isAutoSelectedGroup) {
          placeholder.classList.add('auto-selected');
        }
        placeholder.textContent = `...[${hiddenDuration.toFixed(1)}s]`;
        placeholder.title = '点击展开中间静音片段';
        placeholder.onmouseenter = () => {
          if (isSelecting || shiftRangeAnchor === null) {
            return;
          }
    
          const previewIndex = shiftRangeAnchor <= group.start
            ? group.end - 1
            : group.start + 1;
          updatePreviewRange(shiftRangeAnchor, previewIndex);
        };
        placeholder.onclick = (e) => {
          e.stopPropagation();
          expandedGapGroups.add(group.key);
          render();
        };
    
        hiddenIndexes.forEach((index) => {
          elements[index] = placeholder;
        });
    
        return placeholder;
      }
    
      function createGapGroupContainer(group) {
        const container = document.createElement('span');
        container.className = 'gap-group';
        container.dataset.groupKey = group.key;
    
        const collapseButton = document.createElement('button');
        collapseButton.type = 'button';
        collapseButton.className = 'gap-group-collapse btn-tooltip';
        collapseButton.dataset.tooltip = '折叠连续静音片段';
        collapseButton.innerHTML = `
          <span class="gap-group-collapse-label">折叠</span>
          <svg class="gap-group-collapse-icon" width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M10 2.5V7.5M10 7.5L12.5 5M10 7.5L7.5 5M10 17.5V12.5M10 12.5L12.5 15M10 12.5L7.5 15M3.33333 10H4.16667M7.5 10H8.33333M11.6667 10H12.5M15.8333 10H16.6667" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        `;
        collapseButton.onmouseenter = () => {
          container.classList.add('button-hover');
        };
        collapseButton.onmouseleave = () => {
          container.classList.remove('button-hover');
        };
        collapseButton.onfocus = () => {
          container.classList.add('button-hover');
        };
        collapseButton.onblur = () => {
          container.classList.remove('button-hover');
        };
        collapseButton.onclick = (e) => {
          e.stopPropagation();
          expandedGapGroups.delete(group.key);
          render();
        };
    
        container.appendChild(collapseButton);
        return container;
      }
    
      // 渲染内容
      function render() {
        content.innerHTML = '';
        elements = new Array(words.length).fill(null);
    
        for (let i = 0; i < words.length; i++) {
          const group = getCollapsibleGapGroupAt(i);
          if (group) {
            const isExpanded = expandedGapGroups.has(group.key);
            const container = createGapGroupContainer(group);
    
            if (isExpanded) {
              container.classList.add('expanded');
              for (let j = group.start; j <= group.end; j++) {
                container.appendChild(createWordElement(j));
              }
            } else {
              container.classList.add('collapsed');
              container.appendChild(createWordElement(group.start));
              container.appendChild(createCollapsedGapPlaceholder(group));
              container.appendChild(createWordElement(group.end));
            }
    
            content.appendChild(container);
            i = group.end;
            continue;
          }
    
          content.appendChild(createWordElement(i));
        }
    
        // 计算连续选中状态，添加 selected-start/selected-end 类
        updateSelectedBorderRadius();
        updateStats();
        requestAnimationFrame(positionExpandedGapButtons);
      }
    
      // 更新选中片段的圆角（让连续选中看起来连在一起）
      function updateSelectedBorderRadius() {
        elements.forEach((el, i) => {
          if (!el) return;
          el.classList.remove('selected-start', 'selected-end');
          if (!selected.has(i)) return;
    
          const prevSelected = i > 0 && selected.has(i - 1);
          const nextSelected = i < words.length - 1 && selected.has(i + 1);
    
          if (!prevSelected && !nextSelected) {
            // 单个选中：左右都是圆角
            el.classList.add('selected-start', 'selected-end');
          } else if (!prevSelected) {
            // 连续片段开始：左圆角右尖角
            el.classList.add('selected-start');
          } else if (!nextSelected) {
            // 连续片段结束：左尖角右圆角
            el.classList.add('selected-end');
          }
          // 中间的片段不加任何类（都是尖角）
        });
      }
    
      function getNormalizedRange(startIndex, endIndex) {
        return {
          min: Math.min(startIndex, endIndex),
          max: Math.max(startIndex, endIndex)
        };
      }
    
      function resetShiftPreview() {
        shiftRangeAnchor = null;
        clearPreviewRange();
      }
    
      function applySelectionModeToRange(min, max, mode) {
        for (let j = min; j <= max; j++) {
          if (mode === 'add') {
            selected.add(j);
          } else {
            selected.delete(j);
          }
        }
      }
    
      function getRangeSelectionMode(min, max) {
        for (let j = min; j <= max; j++) {
          if (!selected.has(j)) {
            return 'add';
          }
        }
        return 'remove';
      }
    
      function clearPreviewRange() {
        previewRange = null;
        elements.forEach((el) => {
          if (!el) return;
          el.classList.remove('preview-range', 'preview-start', 'preview-end');
        });
      }
    
      function updatePreviewRange(startIndex, endIndex) {
        clearPreviewRange();
    
        const { min, max } = getNormalizedRange(startIndex, endIndex);
        previewRange = { min, max };
    
        for (let j = min; j <= max; j++) {
          const el = elements[j];
          if (!el) continue;
    
          el.classList.add('preview-range');
          if (j === min) el.classList.add('preview-start');
          if (j === max) el.classList.add('preview-end');
        }
      }
    
      function applyRangeSelection(startIndex, endIndex) {
        clearPreviewRange();
    
        const { min, max } = getNormalizedRange(startIndex, endIndex);
        const mode = getRangeSelectionMode(min, max);
        commitSelectionChange(() => applySelectionModeToRange(min, max, mode));
      }
    
      // 切换选中状态
      function toggle(i) {
        const group = findSelectedGapGroup(i);
        commitSelectionChange(() => {
          if (selected.has(i)) {
            selected.delete(i);
          } else {
            selected.add(i);
          }
    
          if (group) {
            expandedGapGroups.delete(group.key);
          }
        });
      }
    
      // 更新统计
      function updateStats() {
        const { totalDuration, deleteDuration, keptDuration, deletedPercent } = getSelectionStats();
        const deleteCount = selected.size;
    
        statsDiv.innerHTML = `
          <div>总时长: ${formatDuration(totalDuration)}</div>
          <div>保留: ${formatDuration(keptDuration)}</div>
          <div>删除: ${formatDuration(deleteDuration)} (${deletedPercent}%)</div>
          <div>选中: ${deleteCount} 个</div>
        `;
    
        updatePlayerTitle(wavesurfer.getCurrentTime(), totalDuration);
      }
    
      // 复制删除列表
      function copyDeleteList() {
        const segments = [];
        const sortedSelected = Array.from(selected).sort((a, b) => a - b);
        sortedSelected.forEach(i => {
          const word = words[i];
          // 应用过零点偏移
          const start = applyZeroCrossing(word.start);
          const end = applyZeroCrossing(word.end);
          segments.push({ start: start.toFixed(3), end: end.toFixed(3) });
        });
        navigator.clipboard.writeText(JSON.stringify(segments, null, 2));
        alert('📋 删除列表已复制到剪贴板');
      }
    
      // 保存方案
      async function saveSelection() {
        const sortedSelected = Array.from(selected).sort((a, b) => a - b);
        try {
          const res = await fetch('/api/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ selected: sortedSelected })
          });
          const data = await res.json();
          if (data.success) {
            alert('💾 方案已保存: ' + data.file);
          } else {
            alert('❌ 保存失败: ' + data.error);
          }
        } catch (err) {
          alert('❌ 保存失败: ' + err.message);
        }
      }
    
      // 清空选择
      function clearAll() {
        commitSelectionChange(() => {

      }
    
      function undoSelection() {
        if (historyIndex <= 0) return;
        historyIndex--;
        applySelectionSnapshot(selectionHistory[historyIndex]);
      }
    
      function redoSelection() {
        if (historyIndex >= selectionHistory.length - 1) return;
        historyIndex++;
        applySelectionSnapshot(selectionHistory[historyIndex]);
      }
    
      // wavesurfer 就绪
      wavesurfer.on('ready', () => {
        render();
        const duration = wavesurfer.getDuration();
        currentTimeEl.textContent = formatTime(0);

        updatePlayerTitle(0, duration);
        updatePlayPauseIcon(false);

      // wavesurfer 播放/暂停状态变化
      wavesurfer.on('play', () => updatePlayPauseIcon(true));
      wavesurfer.on('pause', () => updatePlayPauseIcon(false));
    
      // wavesurfer 点击波形图跳转
      wavesurfer.on('interaction', (t) => {
        // 高亮当前词
        elements.forEach((el, i) => {
          if (!el) return;
          const word = words[i];
          if (t >= word.start && t < word.end) {
            if (!el.classList.contains('current')) {
              el.classList.add('current');
              el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          } else {
            el.classList.remove('current');
          }
        });
        currentTimeEl.textContent = formatTime(t);
        updatePlayerTitle(t, wavesurfer.getDuration());
      });
    
      // wavesurfer 错误处理
      wavesurfer.on('error', (err) => {
        console.error('wavesurfer error:', err);
        // 音频加载失败时也渲染文字内容
        render();
        currentTimeEl.textContent = '--:--';
        totalTimeEl.textContent = '--:--';
      });
    
      // 备用：DOM 就绪后也尝试渲染（防止 wavesurfer 事件不触发）
      if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(render, 100);
      } else {
        document.addEventListener('DOMContentLoaded', () => setTimeout(render, 100));
      }
    
      syncSidebarUI();
      updateControlsOffset();
    
      if (window.ResizeObserver && controls) {
        const controlsResizeObserver = new ResizeObserver(() => updateControlsOffset());
        controlsResizeObserver.observe(controls);
      }
    
      window.addEventListener('resize', updateControlsOffset);
      window.addEventListener('resize', positionExpandedGapButtons);
      window.addEventListener('scroll', positionExpandedGapButtons, { passive: true });
      mobileQuery.addEventListener('change', () => {
        if (!mobileQuery.matches) {
          sidebarOpenMobile = false;
        }
        syncSidebarUI();
        requestAnimationFrame(positionExpandedGapButtons);
      });
    
      // 播放时间更新 - 跳过选中片段 + 高亮当前词
      wavesurfer.on('timeupdate', (t) => {
        // 播放时跳过选中片段
        if (wavesurfer.isPlaying()) {
          const sortedSelected = Array.from(selected).sort((a, b) => a - b);
          for (const i of sortedSelected) {
            const w = words[i];
            if (t >= w.start && t < w.end) {
              // 找到连续选中片段的末尾
              let endTime = w.end;
              let j = sortedSelected.indexOf(i) + 1;
              while (j < sortedSelected.length) {
                const nextIdx = sortedSelected[j];
                const nextW = words[nextIdx];
                if (nextW.start - endTime < 0.1) {
                  endTime = nextW.end;
                  j++;
                } else {
                  break;
                }
              }
              wavesurfer.setTime(endTime);
              return;
            }
          }
        }
    
        currentTimeEl.textContent = formatTime(t);
        totalTimeEl.textContent = formatTime(wavesurfer.getDuration());
        updatePlayerTitle(t, wavesurfer.getDuration());
    
        // 高亮当前词
        elements.forEach((el, i) => {
          if (!el) return;
          const word = words[i];
          if (t >= word.start && t < word.end) {
            if (!el.classList.contains('current')) {
              el.classList.add('current');
              el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          } else {
            el.classList.remove('current');
          }
        });
      });
    
      // Shift+拖动多选
      content.addEventListener('mousemove', e => {
        const target = e.target.closest('[data-index]');
        if (!target) {
          return;
        }
    
        if (!isSelecting) {
          if (pendingShiftDragStart === -1) {
            return;
          }
    
          const movedEnough = !pendingShiftDragPoint
            || Math.abs(e.clientX - pendingShiftDragPoint.x) > 4
            || Math.abs(e.clientY - pendingShiftDragPoint.y) > 4;
          if (!movedEnough) {
            return;
          }
    
          const i = parseInt(target.dataset.index);
          if (i === pendingShiftDragStart) {
            return;
          }
    
          isSelecting = true;
          selectStart = pendingShiftDragStart;
          selectMode = selected.has(selectStart) ? 'remove' : 'add';
          shiftRangeAnchor = null;
        }
    
        pendingShiftDragCurrent = parseInt(target.dataset.index);
    
        if (isSelecting) {
          updatePreviewRange(selectStart, pendingShiftDragCurrent);
          return;
        }
      });
    
      function finishShiftDrag() {
        pendingShiftDragStart = -1;
        pendingShiftDragPoint = null;
        pendingShiftDragCurrent = -1;
    
        if (!isSelecting) {
          return;
        }
    
        const { min, max } = getNormalizedRange(selectStart, previewRange?.max ?? selectStart);
        const didChange = commitSelectionChange(() => applySelectionModeToRange(min, max, selectMode));
    
        isSelecting = false;
        resetShiftPreview();
        suppressNextClick = true;
        if (!didChange) {
          render();
        }
      }
    
      function cancelShiftDrag() {
        pendingShiftDragStart = -1;
        pendingShiftDragPoint = null;
        pendingShiftDragCurrent = -1;
    
        if (!isSelecting) {
          clearPreviewRange();
          return;
        }
    
        isSelecting = false;
        resetShiftPreview();
        suppressNextClick = true;
      }
    
      // 鼠标释放结束选择
      document.addEventListener('mouseup', () => {
        finishShiftDrag();
      });
    
      content.addEventListener('mouseup', () => {
        pendingShiftDragStart = -1;
        pendingShiftDragPoint = null;
        pendingShiftDragCurrent = -1;
      });
    
      content.addEventListener('mouseleave', () => {
        if (isSelecting || shiftRangeAnchor === null) {
          return;
        }
        updatePreviewRange(shiftRangeAnchor, shiftRangeAnchor);
      });
    
      document.addEventListener('keyup', e => {
        if (e.key === 'Shift') {
          if (isSelecting || pendingShiftDragStart !== -1) {
            cancelShiftDrag();
            return;
          }
    
          resetShiftPreview();
        }
      });
    
      // 生成 EDL
      async function executeCut() {
        const { keptDuration, deletedPercent } = getSelectionStats();
        const shouldGenerate = confirm(`确认生成EDL文件？\n\n预计成品时长${formatDuration(keptDuration)}，已删除${deletedPercent}%`);
        if (!shouldGenerate) return;
    
        const segments = [];
        const sortedSelected = Array.from(selected).sort((a, b) => a - b);
        sortedSelected.forEach(i => {
          const word = words[i];
          // 应用过零点偏移
          segments.push({ start: applyZeroCrossing(word.start), end: applyZeroCrossing(word.end) });
        });
    
        const overlay = document.getElementById('loadingOverlay');
        overlay.classList.add('show');
    
        try {
          const res = await fetch('/api/cut-noclose', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(segments)
          });
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }
          const data = await res.json();
          overlay.classList.remove('show');
    
          if (data.success) {
            const shouldCloseServer = confirm(`✅ EDL已生成，要关闭服务器吗？\n\nEDL文件在“3_审核”目录下，文件名为 ${data.output}`);
            if (shouldCloseServer) {
              try {
                await fetch('/api/shutdown', { method: 'POST', keepalive: true });
              } catch (shutdownErr) {
                console.warn('shutdown failed', shutdownErr);
              }
              window.close();
            }
          } else {
            const errorDetail = data.error ? `\n\n错误信息：${data.error}` : '';
            alert(`❌ EDL生成失败\n\n没有成功生成 EDL 文件，请稍后重试。${errorDetail}`);
          }
        } catch (err) {
          overlay.classList.remove('show');
          const message = String(err?.message || err);
          if (message.includes('Failed to fetch') || message.includes('NetworkError') || message.includes('fetch') || message.startsWith('HTTP ')) {
            alert('❌ 无法连接审核服务器\n\n浏览器没有拿到 /api/cut-noclose 的返回结果。\n\n请确认：\n1. http://localhost:8899 还能正常打开\n2. 审核服务器仍在运行\n3. 再重试一次生成 EDL\n\n如果目录里已经出现 .edl 文件，说明这次其实已经生成成功。');
          } else {
            alert(`❌ EDL生成失败\n\n${message}`);
          }
        }
      }
    
      // 智能 EDL（带过零点检测）
      async function executeSmartCut() {
        const { keptDuration, deletedPercent } = getSelectionStats();
        const shouldGenerate = confirm(`确认生成智能EDL文件（自动过零点）？\n\n预计成品时长${formatDuration(keptDuration)}，已删除${deletedPercent}%。切分点将被优化至最近的过零点，减少爆音。`);
        if (!shouldGenerate) return;
    
        const segments = [];
        const sortedSelected = Array.from(selected).sort((a, b) => a - b);
        sortedSelected.forEach(i => {
          const word = words[i];
          segments.push({ start: word.start, end: word.end });
        });
    
        const overlay = document.getElementById('loadingOverlay');
        overlay.classList.add('show');
        overlay.querySelector('.loading-text').textContent = '⚡ 正在检测过零点...';
    
        try {
          const res = await fetch('/api/cut-smart-noclose', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ deleteSegments: segments, optimizeKeep: true })
          });
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }
          const data = await res.json();
          overlay.classList.remove('show');
    
          if (data.success) {
            const shouldCloseServer = confirm(`✅ 智能EDL已生成，要关闭服务器吗？\n\nEDL文件在“3_审核”目录下，文件名为 ${data.output}`);
            if (shouldCloseServer) {
              try {
                await fetch('/api/shutdown', { method: 'POST', keepalive: true });
              } catch (shutdownErr) {
                console.warn('shutdown failed', shutdownErr);
              }
              window.close();
            }
          } else {
            const errorDetail = data.error ? `\n\n错误信息：${data.error}` : '';
            alert(`❌ EDL生成失败\n\n没有成功生成 EDL 文件，请稍后重试。${errorDetail}`);
          }
        } catch (err) {
          overlay.classList.remove('show');
          const message = String(err?.message || err);
          if (message.includes('Failed to fetch') || message.includes('NetworkError') || message.includes('fetch') || message.startsWith('HTTP ')) {
            alert('❌ 无法连接审核服务器\n\n浏览器没有拿到 /api/cut-smart-noclose 的返回结果。\n\n请确认：\n1. http://localhost:8899 还能正常打开\n2. 审核服务器仍在运行\n3. 再重试一次生成智能 EDL\n\n如果目录里已经出现 _cut_smart.edl 文件，说明这次其实已经生成成功。');
          } else {
            alert(`❌ 智能EDL生成失败\n\n${message}`);
          }
        }
      }
    
      // 键盘快捷键
      document.addEventListener('keydown', e => {
        const isMac = /Mac|iPhone|iPad|iPod/.test(navigator.platform);
        const modifierPressed = isMac ? e.metaKey : e.ctrlKey;
    
        if (modifierPressed && e.key.toLowerCase() === 'z') {
          e.preventDefault();
          if (e.shiftKey) {
            redoSelection();
          } else {
            undoSelection();
          }
          return;
        }
    
        if (e.code === 'Escape' && mobileQuery.matches && sidebarOpenMobile) {
          e.preventDefault();
          toggleSidebar(false);
          return;
        }
    
        if (e.code === 'Space') {
          e.preventDefault();
          wavesurfer.playPause();
        } else if (e.code === 'ArrowLeft') {
          wavesurfer.setTime(Math.max(0, wavesurfer.getCurrentTime() - (e.shiftKey ? 5 : 1)));
        } else if (e.code === 'ArrowRight') {
          wavesurfer.setTime(Math.min(wavesurfer.getDuration(), wavesurfer.getCurrentTime() + (e.shiftKey ? 5 : 1)));
        }
      });
    
      // 暴露给全局，以便 HTML onclick 调用
      window.toggleSidebar = toggleSidebar;
      window.saveSelection = saveSelection;
      window.undoSelection = undoSelection;
      window.redoSelection = redoSelection;
      window.copyDeleteList = copyDeleteList;
      window.clearAll = clearAll;
      window.executeCut = executeCut;
      window.executeSmartCut = executeSmartCut;
      window.wavesurfer = wavesurfer;
    
      updateHistoryButtons();
    
      window.addEventListener('unload', () => closeSession(true));
    }
    

    // 初始化应用
    initReviewPage(words, autoSelected, zeroCrossingOffsets, audioBaseName);
  </script>
</body>
</html>
